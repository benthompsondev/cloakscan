<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CloakScan — redact secrets and personal data from text, on your device</title>
    <meta
      name="description"
      content="CloakScan finds and redacts secrets, API keys, and personal data in text on your own device before you share it. No cloud, no account. Try it in your browser."
    />
    <link rel="canonical" href="https://benthompsondev.github.io/cloakscan/" />

    <!-- Social cards. Plain meta tags only — read by crawlers, never fetched by
         the page, so the strict runtime CSP is unaffected. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CloakScan" />
    <meta property="og:title" content="CloakScan — local-first text redactor for secrets and PII" />
    <meta
      property="og:description"
      content="A local-first tool for cleaning secrets, credentials, infrastructure details, and personal data out of code, logs, prompts, and support text before you share them. Runs on your device — no backend, no telemetry. Try the browser demo or install on Windows or Linux."
    />
    <meta property="og:url" content="https://benthompsondev.github.io/cloakscan/" />
    <meta
      property="og:image"
      content="https://benthompsondev.github.io/cloakscan/social-card.png"
    />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="CloakScan scanning text locally and showing the redacted output" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CloakScan — local-first text redactor for secrets and PII" />
    <meta
      name="twitter:description"
      content="Clean secrets, credentials, and personal data out of text on your device before you share it. No cloud, no account."
    />
    <meta
      name="twitter:image"
      content="https://benthompsondev.github.io/cloakscan/social-card.png"
    />
    <meta name="theme-color" content="#0d1112" />

    <link rel="icon" href="/cloakscan/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Plain markup only: the production CSP allows no inline styles. -->
    <noscript>
      <p>
        CloakScan runs entirely in your browser and needs JavaScript enabled — scanning happens
        on your device and nothing is uploaded. Enable JavaScript, or use the Windows/Linux
        desktop app from
        <a href="https://github.com/benthompsondev/cloakscan/releases/latest">GitHub Releases</a>.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
